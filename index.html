// ─── Week helpers ─────────────────────────────────────────────────────────────
function getWeekKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset * 7 - d.getDay()); // move to Sunday
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekLabel(offset) {
  if (offset === 0) return "This Week";
  if (offset === 1) return "Next Week";
  if (offset === -1) return "Last Week";
  return offset > 0 ? `+${offset} Weeks` : `${Math.abs(offset)} Weeks Ago`;
}
function getWeekDateRange(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset * 7 - d.getDay());
  const sat = new Date(d); sat.setDate(d.getDate() + 6);
  const f = dt => dt.toLocaleDateString('en', { month:'short', day:'numeric' });
  return `${f(d)} – ${f(sat)}`;
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function useLs(key, def) {
  const [v, setV] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s != null ? JSON.parse(s) : def; }
    catch { return def; }
  });
  const set = React.useCallback((fn) => {
    setV(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [v, set];
}

// ─── Overlap engine ───────────────────────────────────────────────────────────
function computeMatches(avail) {
  const REQUIRED = 4, results = [];
  DAYS.forEach((day, di) => {
    const hMap = {};
    Object.entries(avail).forEach(([pid, pAvail]) => {
      (pAvail[di] || []).forEach(h => { if (!hMap[h]) hMap[h] = []; hMap[h].push(pid); });
    });
    const eligible = Object.entries(hMap)
      .map(([h, ps]) => ({ h:+h, ps }))
      .filter(e => e.ps.length >= REQUIRED)
      .sort((a,b) => a.h - b.h);
    let i = 0;
    while (i < eligible.length) {
      let win = [eligible[i]]; let j = i+1;
      while (j < eligible.length && eligible[j].h === eligible[j-1].h+1) {
        const common = eligible[j].ps.filter(p => win[win.length-1].ps.includes(p));
        if (common.length < REQUIRED) break;
        win.push({ h:eligible[j].h, ps:common }); j++;
      }
      const wp = win[win.length-1].ps;
      results.push({
        id:`${di}-${win[0].h}`, day, di,
        start:win[0].h, end:win[0].h+win.length, durMins:win.length*60,
        playerIds:wp, availCount:wp.length,
        quality:win.length>=2?"Perfect":"Good",
        score:win.length*20+Math.min(wp.length,8)*5,
      });
      i = j;
    }
  });
  return results.sort((a,b) => b.score - a.score);
}

// ─── Smart parser ─────────────────────────────────────────────────────────────
function parseAvailabilityQuery(query) {
  const q = query.toLowerCase().trim();
  const ALL = Array.from({length:16}, (_,i) => i+7);
  const DAY_WORDS = { sunday:0,sun:0,monday:1,mon:1,tuesday:2,tue:2,tues:2,wednesday:3,wed:3,thursday:4,thu:4,thurs:4,friday:5,fri:5,saturday:6,sat:6 };
  const DAY_GROUPS = [
    { keys:["every day","everyday","all week","daily","whole week"], days:[0,1,2,3,4,5,6] },
    { keys:["weekday","weekdays","work day","workday"],              days:[0,1,2,3,4] },
    { keys:["weekend","weekends","all weekend"],                     days:[5,6] },
  ];
  const HOUR_WORDS = {
    "early morning":[7,8],"morning":[7,8,9,10,11],"mornings":[7,8,9,10,11],
    "noon":[12,13],"lunch":[12,13],"afternoon":[12,13,14,15,16,17],"afternoons":[12,13,14,15,16,17],
    "evening":[17,18,19,20,21],"evenings":[17,18,19,20,21],"night":[20,21],"nights":[20,21],
    "all day":ALL,"whole day":ALL,"anytime":ALL,
  };
  const days = new Set(), hours = new Set();
  for (const grp of DAY_GROUPS) if (grp.keys.some(k=>q.includes(k))) grp.days.forEach(d=>days.add(d));
  for (const [w,i] of Object.entries(DAY_WORDS)) if (new RegExp(`\\b${w}\\b`).test(q)) days.add(i);
  for (const key of Object.keys(HOUR_WORDS).sort((a,b)=>b.length-a.length)) if (q.includes(key)) HOUR_WORDS[key].forEach(h=>hours.add(h));
  const rangeRe = /(\d{1,2})(?::00)?\s*(?:pm|am)?\s*[-–to]+\s*(\d{1,2})(?::00)?\s*(?:pm|am)?/g;
  let m;
  while ((m = rangeRe.exec(q)) !== null) {
    let [,s,e] = m; let st=+s, en=+e;
    if (q.includes("pm")&&st<12) st+=12;
    if (q.includes("pm")&&en<12) en+=12;
    if (st<7&&!q.includes("am")) st+=12;
    for (let h=st;h<Math.min(en,23);h++) hours.add(h);
  }
  const dArr=[...days].sort((a,b)=>a-b), hArr=[...hours].sort((a,b)=>a-b);
  if (dArr.length&&!hArr.length) return {days:dArr,hours:ALL};
  if (!dArr.length&&hArr.length) return {days:[0,1,2,3,4,5,6],hours:hArr};
  return {days:dArr,hours:hArr};
}

function RatingInput({ rating, setRating }) {
  const [raw, setRaw] = React.useState(rating.toFixed(1));
  React.useEffect(() => { setRaw(rating.toFixed(1)); }, [rating]);
  const color = rating>=5?"#dc2626":rating>=3?BLUE:"#059669";
  const label = RATING_LABEL[Math.round(rating*2)/2]||"";
  const commit = val => {
    const v = parseFloat(val);
    const c = isNaN(v)?1.0:Math.min(7.0,Math.max(1.0,Math.round(v*10)/10));
    setRating(c); setRaw(c.toFixed(1));
  };
  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <p className="text-[11px] uppercase tracking-widest font-bold" style={{color:TXT2}}>Padel Rating</p>

      <input type="number" min="1.0" max="7.0" step="0.1" value={raw}
        onChange={e => { setRaw(e.target.value); const v=parseFloat(e.target.value); if(!isNaN(v)&&v>=1&&v<=7) setRating(Math.round(v*10)/10); }}
        onBlur={e=>commit(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&commit(e.target.value)}
        className="w-full px-4 py-3 rounded-xl text-center text-2xl font-black border"

      />

  );
}

// ─── SCREEN: Join Group ───────────────────────────────────────────────────────
function JoinGroupScreen({ groupId, existingCount, onJoin, groupPlayers }) {
  const isCreator = existingCount === 0;
  const [groupName, setGroupName] = React.useState('');
  const [name,      setName]      = React.useState('');
  const [rating,    setRating]    = React.useState(3.0);

  // Real-time: find an existing Firebase player whose name matches what's typed
  const matchedPlayer = React.useMemo(() => {
    if (!name.trim() || isCreator) return null;
    return Object.values(groupPlayers || {}).find(
      p => (p.name || '').trim().toLowerCase() === name.trim().toLowerCase()
    ) || null;
  }, [name, groupPlayers, isCreator]);

  const isReturning = !!matchedPlayer;
  const canSubmit   = name.trim() && (!isCreator || groupName.trim());
  const doJoin      = () => { if (canSubmit) onJoin({ name:name.trim(), rating, groupName:groupName.trim() }); };

  return (
    <div className="max-w-md mx-auto px-4 py-8 flex flex-col gap-5">
      <div className="text-center">
        <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3 text-white" style={{background:BLUE}}>🎾</div>
        <h1 className="text-xl font-black" style={{color:TXT}}>
          {isCreator ? "Create Your Group" : isReturning ? "Welcome Back!" : "Join the Group"}
        </h1>
        <p className="text-sm mt-1" style={{color:TXT2}}>
          {isCreator
            ? "You'll be the first — invite friends after!"
            : `${existingCount} player${existingCount!==1?'s':''} already in this group`}
        </p>
        <p className="text-[10px] mt-1 font-mono" style={{color:TXT3}}>#{groupId}</p>
      </div>

      {isCreator && (
        <div>
          <p className="text-[11px] uppercase tracking-widest font-bold mb-2" style={{color:TXT2}}>
            Group Name <span style={{color:"#dc2626"}}>*</span>
          </p>
          <input value={groupName} onChange={e=>setGroupName(e.target.value)} autoFocus maxLength={30}
            placeholder='e.g. Thursday Crew, Los Padelistas…'
            className="w-full px-4 py-3.5 rounded-xl text-sm border"
            style={{background:SURF,borderColor:groupName.trim()?BORD:BLUE+"55",color:TXT}}
          />
          {!groupName.trim()&&<p className="text-[10px] mt-1" style={{color:"#dc2626"}}>Required — helps you identify this group later</p>}
        </div>
      )}

      <div>
        <p className="text-[11px] uppercase tracking-widest font-bold mb-2" style={{color:TXT2}}>Your Name</p>
        <input id="playerNameInput" value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&doJoin()}
          placeholder={isCreator ? "How should we call you?" : "Enter your name to join or reconnect"}
          autoFocus={!isCreator} maxLength={20}
          className="w-full px-4 py-3.5 rounded-xl text-sm border"
          style={{background:SURF,borderColor:isReturning?"#16a34a":BLUE+"66",color:TXT,transition:"border-color .2s"}}
        />
        {/* Returning user — profile found */}
        {isReturning && (
          <div className="flex items-center gap-2 mt-2 px-3 py-2 rounded-lg"
            style={{background:"#dcfce7",border:"1px solid #86efac"}}>
            <CheckCircle size={14} color="#16a34a"/>
            <p className="text-xs font-semibold" style={{color:"#15803d"}}>
              Profile found — tap to reconnect as {matchedPlayer.name}!
            </p>
          </div>
        )}
        {/* New user hint */}
        {!isCreator && !isReturning && name.trim() && (
          <p className="text-[10px] mt-1.5" style={{color:TXT3}}>
            Name not found in this group — you'll be added as a new player.
          </p>
        )}
        {/* Hint for users who haven't typed yet */}
        {!isCreator && !name.trim() && (
          <p className="text-[10px] mt-1.5" style={{color:TXT3}}>
            Been here before on another device? Enter the same name to reconnect automatically.
          </p>
        )}
      </div>

      {/* Hide rating input for returning users — their existing rating is preserved */}
      {!isReturning && <RatingInput rating={rating} setRating={setRating}/>}
      {isReturning && (
        <div className="flex items-center gap-3 px-4 py-3 rounded-xl"
          style={{background:BLUE+"08",border:`1px solid ${BLUE}22`}}>
          <CheckCircle size={16} color={BLUE}/>
          <p className="text-xs" style={{color:TXT2}}>
            Your rating (<strong>{(matchedPlayer.rating||3).toFixed(1)}</strong>) and availability history will be restored from the group.
          </p>
        </div>
      )}

      <button onClick={doJoin} disabled={!canSubmit}
        className="w-full py-4 rounded-2xl text-base font-black text-white"
        style={{background:canSubmit?(isReturning?"#16a34a":BLUE):"#94a3b8",transition:"background .2s"}}>
        {isCreator ? "Create Group 🎾" : isReturning ? "Reconnect 🎾" : "Join Group 🎾"}
      </button>
    </div>
  );
}

// ─── SCREEN: Dashboard ────────────────────────────────────────────────────────
function Dashboard({ matches, players, myPlayerId, bookedMatches, groupId, groupName, onUpdateGroupName, isAdmin, onDeletePlayer, onPick, onGoSchedule, myGroups, onSwitchGroup, onCreateGroup, groupCourt, groupUrl, favGroupId, weekKey }) {
  const [copied,         setCopied]         = React.useState(false);
  const [editingGrpName, setEditingGrpName] = React.useState(false);
  const [grpNameInput,   setGrpNameInput]   = React.useState(groupName);
  const ready = players.filter(p=>p.filled).length;
  React.useEffect(()=>{ setGrpNameInput(groupName); }, [groupName]);
  const commitGroupName = () => {
    const t = grpNameInput.trim();
    if (t) onUpdateGroupName(t); else setGrpNameInput(groupName);
    setEditingGrpName(false);
  };
  const shareGroup = () => {
    const url = `${window.location.origin}${window.location.pathname}?group=${groupId}`;
    if (navigator.clipboard) navigator.clipboard.writeText(url).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2500); }).catch(()=>prompt("Invite link:",url));
    else prompt("Invite link:",url);
  };

  return (
    <div className="flex flex-col gap-4 pb-4">
      <div className="pt-4">
        <p className="text-sm" style={{color:TXT2}}>Good to see you,</p>
        <h1 className="text-2xl font-black" style={{color:TXT}}>Let's play Padel 🎾</h1>

      {myGroups.length > 0 && (

          <SectionLabel>My Groups</SectionLabel>
          <div className="flex gap-2 overflow-x-auto pb-1" style={{scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
            {myGroups.map(g => (
              <button key={g.id} onClick={()=>onSwitchGroup(g.id)}
                className="flex-shrink-0 px-3.5 py-2 rounded-xl text-xs font-bold border whitespace-nowrap"
                style={g.id===groupId
                  ? {background:BLUE,color:"#fff",borderColor:BLUE}

                {g.name||`#${g.id.slice(0,6)}`}

              <Plus size={14} color={TXT3}/>

                    style={{cursor:booked?"default":"pointer"}}>
                    <div className="w-12 h-12 rounded-xl flex flex-col items-center justify-center flex-shrink-0"
                      style={{background:idx===0&&!booked?BLUE+"15":BG}}>
                      <span className="text-[11px] font-black" style={{color:idx===0&&!booked?BLUE:TXT3}}>{m.day.slice(0,3).toUpperCase()}</span>
                      <span className="text-[10px]" style={{color:idx===0&&!booked?BLUE+"aa":TXT3}}>{m.start}h</span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-semibold" style={{color:TXT}}>{m.day} · {m.start}:00–{m.end}:00</p>
                      <div className="flex items-center gap-1 mt-1">

                        <span className="text-[10px] ml-0.5" style={{color:TXT3}}>{m.durMins}m</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-1.5 flex-shrink-0">
                      {booked?(
                        <span className="text-[11px] font-bold px-2 py-0.5 rounded-full border" style={{color:TXT3,borderColor:BORD}}>Booked</span>
                      ):(<>
                        {(m.availCount||0)>4&&<span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full" style={{background:"#ede9fe",color:"#7c3aed"}}>{m.availCount} free</span>}
                        <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={m.quality==="Perfect"?{background:BLUE+"18",color:BLUE}:{background:"#fef9c3",color:"#a16207"}}>{m.quality}</span>
                        <ChevronRight size={15} color={TXT3}/>
                      </>)}
                    </div>
                  </div>
                  {/* Google Calendar button — always visible since 4+ players are confirmed */}
                  <div className="px-3.5 pb-3 border-t flex items-center gap-2" style={{borderColor:BORD+"88",paddingTop:"10px"}}>
                    <a href={makeGCalUrl(weekKey, m.di, m.start, m.end, groupCourt)}
                      target="_blank" rel="noopener noreferrer"
                      className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border"
                      style={{background:"#f0fdf4",color:"#16a34a",borderColor:"#86efac"}}>
                      📅 Add to Google Calendar
                    </a>
                    <span className="text-[10px] font-semibold px-2 py-1 rounded-lg" style={{background:"#bbf7d0",color:"#15803d"}}>
                      {m.playerIds?.length??4}/4 players
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Group roster */}
      <div>
        <div className="flex items-center justify-between mb-2.5">
          <SectionLabel>Your Group</SectionLabel>
          {isAdmin&&(()=>{
            const lagging = players.filter(p=>p.slotCount===0);
            if (!lagging.length) return null;
            const msg = `🚨 *Weekly Padel Nudge!* 🚨\n\nCome on guys, everyone updated their availability except for you. Click the link and mark your slots now!\n\nPlayers who haven't submitted yet:\n${lagging.map(p=>`• ${p.name}`).join('\n')}\n\n👉 ${groupUrl}`;
            return (
              <a href={`https://wa.me/?text=${encodeURIComponent(msg)}`} target="_blank" rel="noopener noreferrer"
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border flex-shrink-0"
                style={{background:"#25D36612",color:"#25D366",borderColor:"#25D36633"}}>
                <span style={{fontSize:13}}>💬</span> Nudge ({lagging.length})

        </div>
        <div className="flex flex-col gap-2">
          {players.map(p=>(
            <Card key={p.id} className="flex items-center justify-between px-4 py-3"
              style={p.isMe?{background:BLUE+"08",borderColor:BLUE+"33"}:{}}>
              <div className="flex items-center gap-3">
                <Avatar p={p}/>
                <div>
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <p className="text-sm font-semibold" style={{color:TXT}}>{p.name}</p>
                    {p.isMe&&<span className="text-[9px] px-1.5 py-0.5 rounded-full font-bold text-white" style={{background:BLUE}}>You</span>}
                    <span className="text-[10px]" style={{color:p.slotCount===0?"#f97316":TXT3}}>
                      {p.slotCount} slot{p.slotCount!==1?"s":""}
                    </span>
                  </div>
                  <RatingBadge rating={p.rating}/>
                </div>
              </div>
              <div className="flex items-center gap-2">
                {p.filled
                  ?<span className="flex items-center gap-1 text-[11px] font-semibold" style={{color:BLUE}}><CheckCircle size={13} color={BLUE}/> Ready</span>
                  :<span className="flex items-center gap-1 text-[11px]" style={{color:TXT3}}><CircleIcon size={13} color={TXT3}/> Pending</span>}
                {isAdmin&&!p.isMe&&(
                  <button onClick={()=>onDeletePlayer(p.id)}
                    className="w-6 h-6 rounded-full flex items-center justify-center border flex-shrink-0"
                    style={{background:"#fff0f0",borderColor:"#fecaca"}}

                    <X size={11} color="#dc2626"/>

            </Card>
          ))}
          {players.length===0&&<p className="text-center text-sm py-4" style={{color:TXT3}}>No one here yet — invite your friends!</p>}
        </div>
      </div>

      {/* Weekly Padel Tip */}
      <PadelTipWidget
        mySlotCount={players.find(p=>p.isMe)?.slotCount??0}
        onGoSchedule={onGoSchedule}/>
    </div>
  );
}

// ─── SCREEN: Availability ─────────────────────────────────────────────────────
function Availability({ mySlots, setMySlots, groupPlayers, weekKey, weekOffset, setWeekOffset, myPlayerId }) {
  const [mode, setMode] = React.useState("me");
  const [smartQuery, setSmartQuery] = React.useState('');
  const [smartFeedback, setSmartFeedback] = React.useState('');
  const fbTimer = React.useRef(null);

  const showFeedback = msg => { clearTimeout(fbTimer.current); setSmartFeedback(msg); fbTimer.current=setTimeout(()=>setSmartFeedback(''),3500); };

  // Compute which slots are full (4+ players) and current player is NOT one of them
  const lockedRef = React.useRef(new Set());
  const lockedSet = new Set();
  HOURS.forEach(h => {
    DAYS.forEach((_, di) => {
      const key = `${di}-${h}`;
      const occupants = Object.entries(groupPlayers).filter(([, p]) => p.weeks?.[weekKey]?.[key]);
      const iAmIn = myPlayerId && occupants.some(([pid]) => pid === myPlayerId);
      if (occupants.length >= 4 && !iAmIn) lockedSet.add(key);
    });
  });
  lockedRef.current = lockedSet;

  const drag = React.useRef({ on:false, action:null, lastKey:'' });
  const cellFromPoint = (x,y) => { const el=document.elementFromPoint(x,y); const di=el?.getAttribute('data-di'); const h=el?.getAttribute('data-h'); return(di!=null&&h!=null)?{di:+di,h:+h}:null; };
  const paintCell = React.useCallback((di,h,action)=>{ const key=`${di}-${h}`; if(drag.current.lastKey===key)return; drag.current.lastKey=key; if(action==="add"&&lockedRef.current.has(key))return; setMySlots(prev=>{const n={...prev};if(action==="add")n[key]=true;else delete n[key];return n;}); },[setMySlots]);
  const onGridDown = e => { if(mode!=="me")return; e.preventDefault(); const cell=cellFromPoint(e.clientX,e.clientY); if(!cell)return; const action=mySlots[`${cell.di}-${cell.h}`]?"remove":"add"; drag.current={on:true,action,lastKey:''}; paintCell(cell.di,cell.h,action); e.currentTarget.setPointerCapture?.(e.pointerId); };
  const onGridMove = e => { if(!drag.current.on||mode!=="me")return; const cell=cellFromPoint(e.clientX,e.clientY); if(cell)paintCell(cell.di,cell.h,drag.current.action); };
  const onGridUp   = () => { drag.current={on:false,action:null,lastKey:''}; };

  const applyPreset = preset => setMySlots(prev=>{ const n={...prev}; preset.days.forEach(di=>preset.hours.forEach(h=>{n[`${di}-${h}`]=true;})); return n; });
  const applySmartQuery = q => {
    const txt=q.trim(); if(!txt)return;
    const {days,hours}=parseAvailabilityQuery(txt);
    if(!days.length||!hours.length){showFeedback('⚠ Not understood — try "Monday evening" or "all weekend".');return;}
    setMySlots(prev=>{const n={...prev};days.forEach(di=>hours.forEach(h=>{n[`${di}-${h}`]=true;}));return n;});
    showFeedback(`✓ Added ${days.map(d=>DAYS[d]).join(', ')} · ${Math.min(...hours)}:00–${Math.max(...hours)+1}:00`);
    setSmartQuery('');
  };
  const clearAll = () => setMySlots({});

  const groupCount = (di,h) => Object.values(groupPlayers).reduce((c,p)=>c+(p.weeks?.[weekKey]?.[`${di}-${h}`]?1:0),0);
  const total = Object.keys(mySlots).length;

  return (
    <div className="flex flex-col gap-4 pb-4">
      <div className="pt-4">
        <h1 className="text-2xl font-black" style={{color:TXT}}>Availability</h1>
        <p className="text-sm mt-0.5" style={{color:TXT2}}>Tap or drag to mark your free time</p>
      </div>

      {/* Week navigator */}
      <Card className="overflow-hidden p-0">
        <WeekNav weekOffset={weekOffset} setWeekOffset={setWeekOffset}/>
        {/* My / Group toggle */}
        <div className="flex gap-0.5 p-1.5 border-b" style={{borderColor:BORD}}>
          {["me","group"].map(v=>(
            <button key={v} onClick={()=>setMode(v)}
              className="flex-1 py-2 text-sm font-bold rounded-lg"
              style={mode===v?{background:BLUE,color:"#fff"}:{color:TXT2}}>
              {v==="me"?"My Schedule":"Group Overlap"}
            </button>
          ))}
        </div>

        {/* Grid */}
        <div className="p-3 select-none" style={{touchAction:"none",WebkitUserSelect:"none"}}
          onPointerDown={onGridDown} onPointerMove={onGridMove}
          onPointerUp={onGridUp} onPointerLeave={onGridUp} onPointerCancel={onGridUp}>

          <div className="flex items-center mb-1 gap-px">
            <div className="w-10 flex-shrink-0"/>
            {DAYS.map(d=>(
              <div key={d} className="flex-1 text-center text-[11px] font-bold py-1.5 rounded-sm"
                style={{color:TXT2,background:"#f8fafc"}}>{d}</div>
            ))}
          </div>

          <div className="flex flex-col gap-px">
            {HOURS.map(h=>(
              <div key={h} className="flex items-center gap-px">
                <div className="w-10 flex-shrink-0 text-right pr-1.5 text-[9px]" style={{color:TXT3,pointerEvents:"none"}}>{h}:00</div>
                {DAYS.map((_,di)=>{
                  const key=`${di}-${h}`;
                  const isMine=!!mySlots[key];
                  const gc=groupCount(di,h);
                  const isLocked=mode==="me"&&lockedRef.current.has(key);
                  let bg,border,cursor;
                  if(mode==="group"){ const oc=OVERLAP_COLORS[Math.min(gc,4)]; bg=oc.bg; border=oc.border; cursor="default"; }
                  else if(isLocked){ bg="#e2e8f0"; border="#94a3b8"; cursor="not-allowed"; }
                  else if(isMine){ bg="#bef264"; border="#84cc16"; cursor="crosshair"; }
                  else { bg="#f8fafc"; border="#e2e8f0"; cursor="crosshair"; }
                  return (
                    <div key={di} data-di={di} data-h={h}
                      className="flex-1 h-6 rounded-sm"
                      style={{background:bg,border:`1px solid ${border}`,cursor,touchAction:"none",pointerEvents:"all",opacity:isLocked?0.55:1}}
                      title={isLocked?"Slot full — 4/4 players signed up":undefined}
                    />
                  );
                })}
              </div>
            ))}
          </div>

          {/* Legend / save bar */}
          {mode==="group"?(
            <div className="mt-3">
              <div className="flex items-center justify-between gap-1.5">
                {[{label:"1",desc:"player",idx:1},{label:"2",desc:"players",idx:2},{label:"3",desc:"players",idx:3},{label:"4+",desc:"match!",idx:4}].map(({label,desc,idx})=>{
                  const oc=OVERLAP_COLORS[idx];
                  return(
                    <div key={label} className="flex-1 flex flex-col items-center gap-0.5 py-2 rounded-xl border"
                      style={{background:oc.bg,borderColor:oc.border}}>
                      <span className="text-[13px] font-black" style={{color:oc.text}}>{label}</span>
                      <span className="text-[9px] font-semibold" style={{color:oc.text+"99"}}>{desc}</span>
                    </div>
                  );
                })}
              </div>
              <p className="text-center text-[9px] mt-1.5" style={{color:TXT3}}>players free during this slot</p>
            </div>
          ):(
            <div className="mt-3 flex items-center justify-between">
              <p className="text-xs" style={{color:TXT2}}>{total} slot{total!==1?"s":""} selected</p>
              <div className="flex gap-2">
                {total>0&&<button onClick={clearAll} className="px-3 py-1.5 rounded-xl text-xs font-bold border" style={{color:TXT2,borderColor:BORD}}>Clear all</button>}
                <button className="px-4 py-1.5 rounded-xl text-sm font-black text-white" style={{background:BLUE,pointerEvents:"none"}}>✓ Auto-saved</button>
              </div>
            </div>
          )}
        </div>
      </Card>

      {/* Smart Select */}
      {mode==="me"&&(
        <div>
          <SectionLabel>Smart Select</SectionLabel>
          <div className="flex gap-2 mb-2">
            <input value={smartQuery} onChange={e=>setSmartQuery(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&applySmartQuery(smartQuery)}
              placeholder='"Monday evening", "all weekend", "weekday mornings"…'
              className="flex-1 px-3.5 py-2.5 rounded-xl text-sm border"
              style={{background:SURF,borderColor:BLUE+"44",color:TXT}}
            />
            <button onClick={()=>applySmartQuery(smartQuery)} disabled={!smartQuery.trim()}
              className="px-4 py-2.5 rounded-xl text-sm font-black flex-shrink-0 text-white"
              style={{background:smartQuery.trim()?BLUE:"#94a3b8"}}>✓</button>
          </div>
          {smartFeedback&&<p className="text-[11px] font-semibold mb-2" style={{color:BLUE}}>{smartFeedback}</p>}
          <div className="flex flex-wrap gap-1.5">
            {QUICK_PRESETS.map(preset=>(
              <button key={preset.label} onClick={()=>applyPreset(preset)}
                className="px-3 py-1.5 rounded-lg text-[11px] font-semibold border active:scale-95 transition-transform"
                style={{background:SURF,borderColor:BORD,color:TXT2}}>
                {preset.label}
                <span className="text-[9px] ml-1.5" style={{color:TXT3}}>{preset.sub}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SCREEN: Settings ─────────────────────────────────────────────────────────
function SettingsScreen({ userName,setUserName,userRating,setUserRating,groupName,setGroupName,courts,setCourts,preferredCourt,setPreferredCourt,duration,setDuration,notif,setNotif,myGroups,removeGroup,favGroupId,setFavGroupId,activeGroupId,onSwitchGroup }) {
  const [editingName,    setEditingName]    = React.useState(false);
  const [nameInput,      setNameInput]      = React.useState(userName);
  const [editingGrpName, setEditingGrpName] = React.useState(false);
  const [grpNameInput,   setGrpNameInput]   = React.useState(groupName);
  const [addingCourt,    setAddingCourt]    = React.useState(false);
  const [newCourtInput,  setNewCourtInput]  = React.useState('');
  const [editCourtIdx,   setEditCourtIdx]   = React.useState(null);
  const [editCourtInput, setEditCourtInput] = React.useState('');
  const [flashSaved,     setFlashSaved]     = React.useState(false);

  React.useEffect(()=>{ if(!editingGrpName) setGrpNameInput(groupName); },[groupName]);

  const commitGroupName = () => { const t=grpNameInput.trim(); if(t)setGroupName(t);else setGrpNameInput(groupName); setEditingGrpName(false); };
  const commitName      = () => { const t=nameInput.trim(); if(t)setUserName(t);else setNameInput(userName); setEditingName(false); };
  const addCourt        = () => { const t=newCourtInput.trim(); if(!t)return; setCourts(p=>[...p,t]); setNewCourtInput(''); setAddingCourt(false); };
  const deleteCourt     = idx => setCourts(p=>{ const next=p.filter((_,i)=>i!==idx); if(preferredCourt===p[idx])setPreferredCourt(next[0]||null); return next; });
  const commitCourtEdit = () => { const t=editCourtInput.trim(); if(t) setCourts(p=>{ const old=p[editCourtIdx]; const next=p.map((c,i)=>i===editCourtIdx?t:c); if(preferredCourt===old)setPreferredCourt(t); return next; }); setEditCourtIdx(null); };
  const save = () => { setFlashSaved(true); setTimeout(()=>setFlashSaved(false),2000); };

  return (
    <div className="flex flex-col gap-4 pb-4">
      <div className="pt-4">
        <h1 className="text-2xl font-black" style={{color:TXT}}>Settings</h1>
        <p className="text-sm mt-0.5" style={{color:TXT2}}>Profile &amp; match preferences</p>
      </div>

      {/* Group name */}
      <Card className="p-4">
        <div className="flex items-center justify-between mb-2">
          <SectionLabel>Group Name</SectionLabel>
          {!editingGrpName&&<button onClick={()=>{setGrpNameInput(groupName);setEditingGrpName(true);}} className="flex items-center gap-1 text-[11px] font-bold" style={{color:BLUE}}><Pencil size={11} color={BLUE}/> Edit</button>}
        </div>
        {editingGrpName?(
          <div className="flex items-center gap-2">
            <input value={grpNameInput} onChange={e=>setGrpNameInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")commitGroupName();if(e.key==="Escape"){setEditingGrpName(false);setGrpNameInput(groupName);}}}
              autoFocus maxLength={30} placeholder="e.g. Thursday Crew"
              className="flex-1 bg-transparent text-sm font-bold min-w-0 border-b" style={{color:TXT,borderColor:BLUE}}/>
            <button onClick={commitGroupName} className="px-2.5 py-1 rounded-lg text-xs font-black flex-shrink-0 text-white" style={{background:BLUE}}>Save</button>
            <button onClick={()=>{setEditingGrpName(false);setGrpNameInput(groupName);}}><X size={14} color={TXT3}/></button>
          </div>
        ):(
          <p className="text-sm font-bold" style={{color:TXT}}>{groupName||<span style={{color:TXT3,fontWeight:400,fontStyle:"italic"}}>No name set</span>}</p>
        )}
      </Card>

      {/* Profile */}
      <Card className="p-4">
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 text-white" style={{background:BLUE}}>
            {(userName[0]||"Y").toUpperCase()}{(userName[1]||"O").toUpperCase()}
          </div>
          <div className="flex-1 min-w-0">
            {editingName?(
              <div className="flex items-center gap-2">
                <input value={nameInput} onChange={e=>setNameInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")commitName();if(e.key==="Escape"){setEditingName(false);setNameInput(userName);}}}
                  autoFocus maxLength={20}
                  className="flex-1 bg-transparent text-sm font-bold min-w-0 border-b" style={{color:TXT,borderColor:BLUE}}/>
                <button onClick={commitName} className="px-2.5 py-1 rounded-lg text-xs font-black text-white flex-shrink-0" style={{background:BLUE}}>Save</button>
                <button onClick={()=>{setEditingName(false);setNameInput(userName);}}><X size={14} color={TXT3}/></button>
              </div>
            ):(
              <div className="flex items-center gap-2">
                <span className="font-bold text-sm" style={{color:TXT}}>{userName}</span>
                <button onClick={()=>{setEditingName(true);setNameInput(userName);}}><Pencil size={13} color={TXT3}/></button>
              </div>
            )}
            <div className="mt-0.5"><RatingBadge rating={userRating}/></div>
          </div>
        </div>
      </Card>

      {/* Padel Rating */}
      <Card className="p-4">
        <RatingInput rating={userRating} setRating={setUserRating}/>
      </Card>

      {/* Match Duration */}
      <div>
        <SectionLabel>Match Duration</SectionLabel>
        <div className="flex gap-2">
          {[60,90,120].map(d=><Pill key={d} label={`${d}m`} active={duration===d} onClick={()=>setDuration(d)}/>)}
        </div>
        <p className="text-[10px] mt-1.5" style={{color:TXT3}}>Padel is a 4-player game — group size is fixed.</p>
      </div>

      {/* Courts */}
      <div>
        <div className="flex items-center justify-between mb-2.5">
          <SectionLabel>Padel Courts</SectionLabel>
          {!addingCourt&&<button onClick={()=>setAddingCourt(true)} className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-bold border" style={{background:BLUE+"12",color:BLUE,borderColor:BLUE+"33"}}><Plus size={11} color={BLUE}/> Add Court</button>}
        </div>
        {addingCourt&&(
          <div className="flex gap-2 mb-2.5">
            <input value={newCourtInput} onChange={e=>setNewCourtInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")addCourt();if(e.key==="Escape"){setAddingCourt(false);setNewCourtInput('');} }}
              placeholder="Club or court name…" autoFocus
              className="flex-1 px-3 py-2.5 rounded-xl text-sm border" style={{background:SURF,borderColor:BLUE+"55",color:TXT}}/>
            <button onClick={addCourt} className="px-3.5 rounded-xl text-sm font-black text-white" style={{background:BLUE}}>Add</button>
            <button onClick={()=>{setAddingCourt(false);setNewCourtInput('');}} className="px-3 rounded-xl border flex items-center" style={{background:SURF,borderColor:BORD}}><X size={14} color={TXT3}/></button>
          </div>
        )}
        {courts.length===0&&!addingCourt&&<p className="text-xs text-center py-4" style={{color:TXT3}}>No courts added yet — tap "Add Court".</p>}
        <div className="flex flex-col gap-1.5">
          {courts.map((c,idx)=>(
            <Card key={idx} className="flex items-center gap-2 px-3.5 py-3"
              style={preferredCourt===c?{background:BLUE+"08",borderColor:BLUE+"33"}:{}}>
              <button onClick={()=>setPreferredCourt(c)} className="flex items-center gap-2.5 flex-1 min-w-0 text-left">
                <MapPin size={13} color={preferredCourt===c?BLUE:TXT3}/>
                {editCourtIdx===idx?(
                  <input value={editCourtInput} onChange={e=>setEditCourtInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")commitCourtEdit();if(e.key==="Escape")setEditCourtIdx(null);}}
                    onBlur={commitCourtEdit} autoFocus
                    className="flex-1 bg-transparent text-sm font-medium min-w-0 border-b" style={{color:TXT,borderColor:BLUE}}/>
                ):(
                  <span className="text-sm font-medium truncate" style={{color:preferredCourt===c?TXT:TXT2}}>{c}</span>
                )}
              </button>
              <div className="flex items-center gap-1 flex-shrink-0">
                {preferredCourt===c&&editCourtIdx!==idx&&<Check size={13} color={BLUE}/>}
                <button onClick={()=>{setEditCourtIdx(idx);setEditCourtInput(c);}} className="w-7 h-7 rounded-lg flex items-center justify-center border" style={{background:"#f8fafc",borderColor:BORD}}><Pencil size={11} color={TXT3}/></button>
                <button onClick={()=>deleteCourt(idx)} className="w-7 h-7 rounded-lg flex items-center justify-center border" style={{background:"#fff0f0",borderColor:"#fecaca"}}><Trash size={11} color="#dc2626"/></button>
              </div>
            </Card>

      {/* Notifications */}
      <Card className="flex items-center justify-between px-4 py-3.5">
        <div className="flex items-center gap-2.5">
          <Bell size={15} color={notif?BLUE:TXT3}/>
          <span className="text-sm font-medium" style={{color:TXT}}>Match Notifications</span>
        </div>
        <button onClick={()=>setNotif(n=>!n)}
          className="w-11 h-6 rounded-full relative flex-shrink-0" style={{background:notif?BLUE:"#e2e8f0"}}>
          <div className="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow" style={{left:notif?"calc(100% - 22px)":"2px",transition:"left .15s"}}/>
        </button>
      </Card>

      {/* My Saved Groups */}
      <div>
        <SectionLabel>My Saved Groups</SectionLabel>
        {myGroups.length===0?(
          <p className="text-xs text-center py-4" style={{color:TXT3}}>No saved groups yet — create or join one!</p>
        ):(
          <div className="flex flex-col gap-2">
            {myGroups.map(g=>(
              <Card key={g.id} className="flex items-center gap-3 px-4 py-3"
                style={g.id===activeGroupId?{background:BLUE+"08",borderColor:BLUE+"33"}:{}}>
                <button onClick={()=>onSwitchGroup(g.id)} className="flex-1 text-left min-w-0">
                  <div className="flex items-center gap-1.5">
                    <p className="text-sm font-semibold truncate" style={{color:TXT}}>{g.name||`#${g.id.slice(0,6)}`}</p>
                    {g.id===activeGroupId&&<span className="text-[9px] px-1.5 py-0.5 rounded-full font-bold text-white flex-shrink-0" style={{background:BLUE}}>Active</span>}
                    {g.isAdmin&&<span className="text-[9px] px-1.5 py-0.5 rounded-full font-bold flex-shrink-0" style={{background:BLUE+"18",color:BLUE}}>Admin</span>}
                  </div>
                  <p className="text-[10px] font-mono mt-0.5" style={{color:TXT3}}>#{g.id}</p>
                </button>
                <div className="flex items-center gap-1.5 flex-shrink-0">
                  <button onClick={()=>{
                    const newFav = favGroupId===g.id ? null : g.id;
                    setFavGroupId(newFav);
                    // Hard redirect guarantees Firebase re-attaches and dashboard reloads cleanly
                    if (newFav && newFav!==activeGroupId) {
                      window.location.href = window.location.origin + window.location.pathname + '?group=' + newFav;
                    }
                  }}
                    className="w-8 h-8 rounded-xl flex items-center justify-center border"
                    style={favGroupId===g.id?{background:"#fef9c3",borderColor:"#fbbf24"}:{background:"#f8fafc",borderColor:BORD}}
                    title={favGroupId===g.id?"Remove favourite":"Set as favourite & switch now"}>
                    <span style={{fontSize:15,lineHeight:1}}>{favGroupId===g.id?"⭐":"☆"}</span>
                  </button>
                  {g.id!==activeGroupId&&(
                    <button onClick={()=>removeGroup(g.id)}
                      className="w-8 h-8 rounded-xl flex items-center justify-center border"
                      style={{background:"#fff0f0",borderColor:"#fecaca"}}
                      title="Remove from saved groups">
                      <Trash size={12} color="#dc2626"/>
                    </button>
                  )}
                </div>
              </Card>
            ))}
          </div>
        )}
        {favGroupId&&<p className="text-[10px] mt-1.5 text-center" style={{color:TXT3}}>⭐ Starred group opens automatically when you launch the app</p>}
      </div>

      <button onClick={save}
        className="w-full py-4 rounded-2xl text-base font-black text-white flex items-center justify-center gap-2"
        style={{background:BLUE}}>
        {flashSaved?<><Check size={18} color="#fff"/> Saved!</>:"Save Settings"}
      </button>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function PadelMeet() {
  const urlGroupId = React.useMemo(() => {
    const p = new URLSearchParams(window.location.search);
    return p.get('group')||p.get('g')||null;
  }, []);

  // ── Multi-group storage ──────────────────────────────────────────────────────
  // myGroups: [{ id, name, playerId, color, isAdmin }]
  // myProfile: { name, rating }  — shared across all groups
  const [myGroups,    setMyGroups]    = useLs("pm_groups",   []);
  const [myProfile,   setMyProfile]   = useLs("pm_profile",  { name:'', rating:3.0 });
  const [favGroupId,  setFavGroupId]  = useLs("pm_fav_group", null);

  // Restore last visited group; favourite takes priority over last-visited
  const [groupId, setGroupId] = React.useState(() => {
    if (urlGroupId) return urlGroupId;
    try {
      const g = JSON.parse(localStorage.getItem('pm_groups')||'[]');
      if (g.length === 0) return null;
      const favId = JSON.parse(localStorage.getItem('pm_fav_group')||'null');
      if (favId && g.some(x => x.id === favId)) return favId;
      return g[g.length-1].id;
    } catch { return null; }
  });

  // Sync URL when we restored a groupId from localStorage
  React.useEffect(() => {
    if (groupId && !urlGroupId) history.replaceState({}, '', `?group=${groupId}`);
  }, []);

  // Migrate old pm_my_info format on first run
  React.useEffect(() => {
    if (myGroups.length > 0) return;
    try {
      const old = JSON.parse(localStorage.getItem('pm_my_info')||'null');
      if (old?.playerId && old?.groupId) {
        setMyGroups([{ id:old.groupId, name:'', playerId:old.playerId, color:old.color, isAdmin:!!old.isAdmin }]);
        if (!myProfile.name) setMyProfile({ name:old.name||'', rating:old.rating||3.0 });
      }
    } catch {}
  }, []);

  // Current group membership entry
  const myGroupEntry   = myGroups.find(g => g.id === groupId) || null;
  const alreadyInGroup = !!myGroupEntry;

  const [groupData, setGroupData] = React.useState({ players:{}, booked:{}, name:'' });
  const [fbLoading, setFbLoading] = React.useState(false);

  // Multi-week state
  const [weekOffset, setWeekOffset] = React.useState(0);
  const weekKey = React.useMemo(() => getWeekKey(weekOffset), [weekOffset]);

  // Per-group, per-week slots  { [groupId]: { [weekKey]: { slotKey: true } } }
  const [allMySlots, setAllMySlots] = useLs("pm_slots_v3", {});
  const mySlots = React.useMemo(() => allMySlots[groupId]?.[weekKey]||{}, [allMySlots, groupId, weekKey]);
  const setMySlots = React.useCallback((updater) => {
    setAllMySlots(prev => {
      const gs   = prev[groupId]||{};
      const cur  = gs[weekKey]||{};
      const next = typeof updater==='function' ? updater(cur) : updater;
      return { ...prev, [groupId]: { ...gs, [weekKey]: next } };
    });
  }, [groupId, weekKey, setAllMySlots]);

  // Local settings
  const [courts,         setCourts]         = useLs("pm_courts",     ["Club Padel Norte","Arena Sports","Padel Factory"]);
  const [preferredCourt, setPreferredCourt] = useLs("pm_pref_court", "Club Padel Norte");
  const [duration,       setDuration]       = useLs("pm_duration",   90);
  const [notif,          setNotif]          = useLs("pm_notif",      true);

  const [screen, setScreen] = React.useState(() => {
    if (!FIREBASE_READY) return 'setup';
    const target = urlGroupId || (() => {
      try {
        const g = JSON.parse(localStorage.getItem('pm_groups')||'[]');
        if (!g.length) return null;
        const favId = JSON.parse(localStorage.getItem('pm_fav_group')||'null');
        return (favId && g.some(x=>x.id===favId)) ? favId : g[g.length-1].id;
      } catch { return null; }
    })();
    if (!target) return 'onboarding';
    try {
      const g = JSON.parse(localStorage.getItem('pm_groups')||'[]');
      if (g.some(x => x.id===target)) return 'loading';
      // legacy pm_my_info fallback
      const old = JSON.parse(localStorage.getItem('pm_my_info')||'null');
      if (old?.groupId===target && old?.playerId) return 'loading';
    } catch {}
    return urlGroupId ? 'join' : 'onboarding';
  });
  const [picked, setPicked] = React.useState(null);

  // Firebase subscription
  React.useEffect(() => {
    if (!db||!groupId) return;
    setFbLoading(true);
    const ref = db.ref(`groups/${groupId}`);
    ref.on('value', snap => { setGroupData(snap.val()||{players:{},booked:{},name:''}); setFbLoading(false); });
    return () => ref.off('value');
  }, [groupId]);

  // Keep local group name in sync with Firebase
  React.useEffect(() => {
    if (!groupId || !groupData.name) return;
    setMyGroups(prev => prev.map(g => g.id===groupId ? { ...g, name:groupData.name } : g));
  }, [groupData.name, groupId]);

  // Routing
  React.useEffect(() => {
    if (!FIREBASE_READY){ setScreen('setup');     return; }
    if (!groupId)        { setScreen('onboarding'); return; }
    if (fbLoading)       return;
    if (!alreadyInGroup) { setScreen('join');      return; }
    const playersObj = groupData.players||{};
    const hasPlayers = Object.keys(playersObj).length > 0;
    if (hasPlayers && !playersObj[myGroupEntry?.playerId]) {
      setMyGroups(prev => prev.filter(g => g.id!==groupId));
      setScreen('join');
      return;
    }
    setScreen(s => (s==='loading'||s==='join') ? 'dashboard' : s);
  }, [groupId, fbLoading, alreadyInGroup, groupData.players]);

  // Sync slots to Firebase (debounced)
  const slotsTimer = React.useRef(null);
  React.useEffect(() => {
    if (!db||!groupId||!myGroupEntry?.playerId) return;
    clearTimeout(slotsTimer.current);
    slotsTimer.current = setTimeout(() => {
      db.ref(`groups/${groupId}/players/${myGroupEntry.playerId}/weeks/${weekKey}`).set(mySlots);
    }, 500);
  }, [mySlots, weekKey]);

  // Sync name/rating to Firebase
  React.useEffect(() => {
    if (!db||!groupId||!myGroupEntry?.playerId) return;
    db.ref(`groups/${groupId}/players/${myGroupEntry.playerId}`).update({ name:myProfile.name, rating:myProfile.rating, color:myGroupEntry.color });
  }, [myProfile.name, myProfile.rating]);

  // Sync preferred court → Firebase (any member can set the group court)
  React.useEffect(() => {
    if (!db||!groupId||!preferredCourt) return;
    db.ref(`groups/${groupId}/court`).set(preferredCourt);
  }, [preferredCourt, groupId]);

  // Pull court from Firebase → local state (keeps all members in sync)
  React.useEffect(() => {
    if (groupData.court && groupData.court !== preferredCourt) setPreferredCourt(groupData.court);
  }, [groupData.court]);

  // Handlers
  const handleCreateGroup = React.useCallback(() => {
    const code = generateGroupCode();
    history.pushState({}, '', `?group=${code}`);
    setGroupId(code);
    setGroupData({ players:{}, booked:{}, name:'' });
    setScreen('join');
  }, []);

  const handleJoinCode = (code) => {
    const c = code.trim().toLowerCase();
    history.pushState({}, '', `?group=${c}`);
    setGroupId(c);
    setGroupData({ players:{}, booked:{}, name:'' });
    setScreen('join');
  };

  const handleJoin = ({ name, rating, groupName:gName }) => {
    const playersObj     = groupData.players || {};
    const playerEntries  = Object.entries(playersObj);

    // ── Case-insensitive name match: returning user on a new device ──
    const matchEntry = playerEntries.find(
      ([, p]) => (p.name||'').trim().toLowerCase() === name.trim().toLowerCase()
    );

    if (matchEntry) {
      const [existingPid, existingP] = matchEntry;
      // Admin = player with the earliest joinedAt (i.e. the original creator)
      const isAdmin = playerEntries.every(
        ([pid, p]) => pid === existingPid || (existingP.joinedAt||0) <= (p.joinedAt||Infinity)
      );
      // Restore profile from Firebase data
      setMyProfile({ name: existingP.name, rating: existingP.rating || rating });
      setMyGroups(prev => ([
        ...prev.filter(g => g.id !== groupId),
        { id:groupId, name:groupData.name||'', playerId:existingPid,
          color:existingP.color||PLAYER_COLORS[0], isAdmin },
      ]));
      // Write a lastSeen timestamp so the group knows this device reconnected
      if (db && groupId) {
        db.ref(`groups/${groupId}/players/${existingPid}`).update({ lastSeen: Date.now() });
      }

    } else {
      // ── New player: create a fresh entry ──
      const isAdmin  = playerEntries.length === 0;
      const color    = PLAYER_COLORS[playerEntries.length % PLAYER_COLORS.length];
      const playerId = generatePlayerId();
      setMyProfile({ name, rating });
      setMyGroups(prev => ([
        ...prev.filter(g => g.id !== groupId),
        { id:groupId, name:gName||groupData.name||'', playerId, color, isAdmin },
      ]));
      if (db && groupId) {
        db.ref(`groups/${groupId}/players/${playerId}`).set({
          name, rating, color, weeks:{ [weekKey]:{} }, joinedAt:Date.now()
        });
        if (gName) db.ref(`groups/${groupId}/name`).set(gName);
      }
    }

    setScreen('dashboard');
  };

  const handleSwitchGroup = React.useCallback((gid) => {
    if (gid===groupId) return;
    history.pushState({}, '', `?group=${gid}`);
    setGroupId(gid);
    setGroupData({ players:{}, booked:{}, name:'' });
    setFbLoading(true);
    setScreen('loading');
  }, [groupId]);

  const bookMatch = React.useCallback((match) => {
    if (db&&groupId) db.ref(`groups/${groupId}/booked/${match.id}`).set({ ...match, bookedBy:myGroupEntry?.playerId, bookedAt:Date.now() });
  }, [groupId, myGroupEntry]);

  const deletePlayer = React.useCallback((pid) => {
    if (db&&groupId) db.ref(`groups/${groupId}/players/${pid}`).remove();
  }, [groupId]);

  const setUserName   = name   => setMyProfile(prev=>({...prev,name}));
  const setUserRating = rating => setMyProfile(prev=>({...prev,rating}));
  const groupName     = groupData.name||'';
  const updateGroupName = React.useCallback(name => { if(db&&groupId) db.ref(`groups/${groupId}/name`).set(name); }, [groupId]);

  // Derived
  const players = React.useMemo(() =>
    Object.entries(groupData.players||{}).map(([pid,p],i)=>({
      id:pid, name:p.name||'?', rating:p.rating||3.0,
      color:     p.color||PLAYER_COLORS[i%PLAYER_COLORS.length],
      slotCount: Object.keys(p.weeks?.[weekKey]||{}).length,
      filled:    Object.keys(p.weeks?.[weekKey]||{}).length>0,
      isMe:      pid===myGroupEntry?.playerId,
    })),
  [groupData.players, myGroupEntry?.playerId, weekKey]);

  const removeGroup = React.useCallback((gid) => {
    setMyGroups(prev => prev.filter(g => g.id !== gid));
    if (favGroupId === gid) setFavGroupId(null);
  }, [favGroupId]);

  const fullAvail = React.useMemo(() => {
    const a = {};
    Object.entries(groupData.players||{}).forEach(([pid,p]) => { a[pid]=slotsToAvail(p.weeks?.[weekKey]||{}); });
    return a;
  }, [groupData.players, weekKey]);

  const matches       = React.useMemo(()=>computeMatches(fullAvail),[fullAvail]);
  const bookedMatches = React.useMemo(()=>Object.values(groupData.booked||{}),[groupData.booked]);
  const myPlayer      = players.find(p=>p.isMe)||{ name:myProfile.name||"You", rating:myProfile.rating||3.0, color:myGroupEntry?.color||BLUE };
  const isAdminNow    = !!myGroupEntry?.isAdmin || localStorage.getItem('pm_force_admin')==='true';
  const groupCourt    = groupData.court || preferredCourt || null;

  const showNav  = ['dashboard','availability','preferences'].includes(screen);
  const showTop  = !['setup','onboarding'].includes(screen);

  return (
    <div style={{minHeight:"100vh", background:BG}}>
      {showTop && <TopBar groupName={groupName} bookedCount={bookedMatches.length}/>}

      <main className="max-w-2xl mx-auto px-4" style={{paddingBottom: showNav ? 80 : 16}}>
        {screen==='setup'      && <SetupScreen/>}
        {screen==='onboarding' && <OnboardingScreen onCreate={handleCreateGroup} onJoinCode={handleJoinCode}/>}
        {screen==='loading'    && (
          <div className="flex flex-col items-center justify-center py-24 gap-3">
            <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-2xl" style={{background:BLUE+"18"}}>🎾</div>
            <p className="text-sm" style={{color:TXT2}}>Loading group...</p>
            <p className="text-[10px] font-mono" style={{color:TXT3}}>#{groupId}</p>
          </div>
        )}
        {screen==='join' && (
          <JoinGroupScreen groupId={groupId} existingCount={Object.keys(groupData.players||{}).length}
            onJoin={handleJoin} groupPlayers={groupData.players||{}}/>
        )}
        {screen==='dashboard' && (
          <Dashboard matches={matches} players={players} myPlayerId={myGroupEntry?.playerId}
            bookedMatches={bookedMatches} groupId={groupId} groupName={groupName}
            onUpdateGroupName={updateGroupName}
            isAdmin={isAdminNow} onDeletePlayer={deletePlayer}
            onPick={m=>{setPicked(m);setScreen('detail');}}
            onGoSchedule={()=>setScreen('availability')}
            myGroups={myGroups} onSwitchGroup={handleSwitchGroup} onCreateGroup={handleCreateGroup}
            groupCourt={groupCourt}
            groupUrl={`${window.location.origin}${window.location.pathname}?group=${groupId}`}
            favGroupId={favGroupId} weekKey={weekKey}/>
        )}
        {screen==='availability' && (
          <Availability mySlots={mySlots} setMySlots={setMySlots}
            groupPlayers={groupData.players||{}} weekKey={weekKey}
            weekOffset={weekOffset} setWeekOffset={setWeekOffset}
            myPlayerId={myGroupEntry?.playerId}/>
        )}
        {screen==='preferences' && (
          <SettingsScreen
            userName={myPlayer.name}        setUserName={setUserName}
            userRating={myPlayer.rating}    setUserRating={setUserRating}
            groupName={groupName}           setGroupName={updateGroupName}
            courts={courts}                 setCourts={setCourts}
            preferredCourt={preferredCourt} setPreferredCourt={setPreferredCourt}
            duration={duration}             setDuration={setDuration}
            notif={notif}                   setNotif={setNotif}
            myGroups={myGroups}             removeGroup={removeGroup}
            favGroupId={favGroupId}         setFavGroupId={setFavGroupId}
            activeGroupId={groupId}         onSwitchGroup={handleSwitchGroup}/>
        )}
        {screen==='detail' && picked && (
          <MatchDetail match={picked} players={players} courts={courts}
            preferredCourt={preferredCourt}
            onBack={()=>setScreen('dashboard')} onBook={bookMatch}
            onSchedule={()=>setScreen('availability')}
            weekKey={weekKey} groupCourt={groupCourt}/>
        )}
      </main>

      {showNav && screen!=='detail' && <BottomNav screen={screen} setScreen={setScreen}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PadelMeet/>);
  </script>

  <div style="position:fixed;top:10px;right:12px;z-index:9999;">
    <button onclick="localStorage.setItem('isAdmin','true');localStorage.setItem('pm_force_admin','true');location.reload();"
      style="font-size:11px;color:#64748b;background:rgba(255,255,255,0.9);border:1px solid #cbd5e1;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;">
      Activate Admin Mode
    </button>
  </div>
</body>
</html>
